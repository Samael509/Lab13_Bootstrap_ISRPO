<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <body>
        <div class="container mt-5">
            <h2 class="text-center mb-4">Моё портфолио</h2>
            <!-- кнопки -->
             <div class="text-center mb-4">
                <div class="btn_gtoup" role="group">
                    <button class="btn btn-outline-primary" onclick="filterGallery('all')">Все</button>
                    <button class="btn btn-outline-primary" onclick="filterGallery('web')">Веб-дизайн</button>
                    <button class="btn btn-outline-primary" onclick="filterGallery('photo')">Фотография</button>
                    <button class="btn btn-outline-primary" onclick="filterGallery('graphic')">Графика</button>
                </div>
             </div>
        </div>

        <div class="row g-3" id="gallery">
            <!-- Карточка 1 -->
        <div class="col-12 col-sm-6 col-md-4 gallery-item" data-category="web">
        <div class="card h-100">
            <img src="https://avatars.mds.yandex.net/i?id=0141c8cacfce4bec4721218ba2c891aa04e186f7-9065817-images-thumbs&n=13" class="card-img-top" alt="Веб-проект" />
            <div class="card-body p-2">
                <h6 class="card-title mb-0">Корпоративный сайт</h6>
                <small class="text-muted">Веб-дизайн</small>
            </div>
        </div>
        </div>
        <!-- Карточка 2 -->
        <div class="col-12 col-sm-6 col-md-4 gallery-item" data-category="photo">
        <div class="card h-100">
            <img src="https://avatars.mds.yandex.net/i?id=b2c6528fdb02360464a2d2537299021a7e087312-4373502-images-thumbs&n=13" height="350" class="card-img-top" alt="Фотография" />
            <div class="card-body p-2">
                <h6 class="card-title mb-0">Лес</h6>
                <small class="text-muted">Фотография</small>
            </div>
        </div>
        </div>
        <!-- Карточка 3 -->
        <div class="col-12 col-sm-6 col-md-4 gallery-item" data-category="graphic">
        <div class="card h-100">
            <img src="https://avatars.mds.yandex.net/i?id=ccaeadfe82f3dbb6b9c9427b6160e823e3cbd1e7-4727095-images-thumbs&n=13" class="card-img-top" alt="Графика" />
            <div class="card-body p-2">
                <h6 class="card-title mb-0">Metro Exodus</h6>
                <small class="text-muted">Графика</small>
            </div>
        </div>
        </div>
        <!-- Карточка 4 -->
        <div class="col-12 col-sm-6 col-md-4 gallery-item" data-category="photo">
        <div class="card h-100">
            <img src="https://avatars.mds.yandex.net/i?id=a54947265a235efbbb611de52b3bb197ba9902e2-12508201-images-thumbs&n=13" height="350" class="card-img-top" alt="Фото" />
            <div class="card-body p-2">
                <h6 class="card-title mb-0">Пустошь</h6>
                <small class="text-muted">Фотография</small>
            </div>
        </div>
        </div>
        <!-- Карточка 5 -->
        <div class="col-12 col-sm-6 col-md-4 gallery-item" data-category="web">
        <div class="card h-100">
            <img src="https://avatars.mds.yandex.net/i?id=a027aee675b5573734607c4906be966f03603902-5659524-images-thumbs&n=13" height="300" class="card-img-top" alt="Веб-проект" />
            <div class="card-body p-2">
                <h6 class="card-title mb-0">Другой сайт</h6>
                <small class="text-muted">Веб-дизайн</small>
            </div>
        </div>
        </div>
        <!-- Карточка 6 -->
        <div class="col-12 col-sm-6 col-md-4 gallery-item" data-category="graphic">
        <div class="card h-100">
            <img src="https://avatars.mds.yandex.net/i?id=b62129609cf81f1c84afadac11eb227c1ce99712-10415168-images-thumbs&n=13" class="card-img-top" alt="Графика" />
            <div class="card-body p-2">
                <h6 class="card-title mb-0">rdr2</h6>
                <small class="text-muted">Графика</small>
            </div>
        </div>
        </div>
        </div>
        </div>
    </body>
    <script>
        function filterGallery(category) {
            const items = document.querySelectorAll(".gallery-item");
            const buttons = document.querySelectorAll("btn-group .btn");
            buttons.forEach((btn) => {
                btn.classList.remove("active");
            });
            event.target.classList.add("active");
            items.forEach((item) => {
                const itemCategory = item.dataset.category;
                if(category === "all" || category === itemCategory) {
                    item.style.display = "block";
                } else {
                    item.style.display = "none";
                }
            });
        }
    
        window.onload = function () {
            document.querySelector(".btn-group .btn").classList.add("active");
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
